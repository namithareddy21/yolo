<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YOLOv8 Real-Time Object Detection</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom right, #eef2f3, #d9e7f8);
      padding: 25px;
      margin: 0;
    }

    h1 {
      font-size: 34px;
      color: #1d344f;
      margin-bottom: 15px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .btn {
      padding: 12px 28px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.25s;
      color: white;
    }

    .start {
      background-color: #28a745;
    }

    .start:hover {
      background-color: #1f8b39;
    }

    .stop {
      background-color: #dc3545;
    }

    .stop:hover {
      background-color: #b62a37;
    }

    #video, #canvas {
      width: 70%;
      max-width: 850px;
      border: 3px solid #2f3b52;
      border-radius: 15px;
      margin-top: 20px;
      background: white;
    }

    footer {
      margin-top: 25px;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>

<body>

  <h1>YOLOv8 REAL-TIME OBJECT DETECTION</h1>

  <button class="btn start" onclick="startCamera()">Start Detection</button>
  <button class="btn stop" onclick="stopCamera()">Stop Detection</button>

  <br>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <footer>Powered by YOLOv8 • Real-time detection using your webcam</footer>

  <script>
    let video = document.getElementById("video");
    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");
    let cameraStream = null;
    let detectionInterval = null;

    // 🔴 CHANGE THIS TO YOUR BACKEND URL
    const BACKEND_URL = "https://245124737109.pythonanywhere.com/detect";
    // Example for Render:
    // const BACKEND_URL = "https://your-app-name.onrender.com/detect";

    async function startCamera() {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = cameraStream;

        video.onloadedmetadata = () => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
        };

        detectionInterval = setInterval(captureAndSendFrame, 300); // ~3 FPS
      } catch (err) {
        console.error("Camera Error:", err);
      }
    }

    function stopCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
      }
      clearInterval(detectionInterval);
    }

    async function captureAndSendFrame() {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(async (blob) => {
        const formData = new FormData();
        formData.append("image", blob, "frame.jpg");

        try {
          const response = await fetch(BACKEND_URL, {
            method: "POST",
            body: formData,
          });

          const result = await response.json();
          drawDetections(result);

        } catch (err) {
          console.error("Detection error:", err);
        }
      }, "image/jpeg");
    }

    function drawDetections(data) {
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      if (!data || !data.boxes) return;

      ctx.lineWidth = 3;
      ctx.strokeStyle = "red";
      ctx.font = "20px Arial";
      ctx.fillStyle = "red";

      data.boxes.forEach(box => {
        let [x1, y1, x2, y2] = box.xyxy;
        let label = `${box.class} (${box.confidence}%)`;

        ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
        ctx.fillText(label, x1, y1 - 8);
      });
    }
  </script>

</body>
</html>
