<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-Time Object Detection</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        #container {
            position: relative;
            display: inline-block;
        }

        #video, #canvas {
            width: 640px;
            height: 480px;
            border-radius: 10px;
            background: black;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        h1 {
            margin-bottom: 20px;
        }
    </style>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <h1>Real-Time Object Detection (YOLOv8)</h1>

    <div id="container">
        <video id="video" autoplay muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = 640;
        canvas.height = 480;

        const socket = io();

        // Start camera
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            video.srcObject = stream;

            video.addEventListener("play", () => {
                sendFrames();
                drawLoop();
            });
        });

        // Send frames to backend
        function sendFrames() {
            const tempCanvas = document.createElement("canvas");
            const tctx = tempCanvas.getContext("2d");
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;

            setInterval(() => {
                tctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
                const dataUrl = tempCanvas.toDataURL("image/jpeg");
                socket.emit("frame", dataUrl);
            }, 80);  // every 80ms
        }

        // Store detections
        let latestDetections = [];

        // Receive detection results
        socket.on("detections", (data) => {
            latestDetections = data.detections;
        });

        // Drawing loop
        function drawLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            latestDetections.forEach(det => {
                const scaleX = canvas.width / video.videoWidth;
                const scaleY = canvas.height / video.videoHeight;

                const x1 = det.x1 * scaleX;
                const y1 = det.y1 * scaleY;
                const w = det.w * scaleX;
                const h = det.h * scaleY;

                // 🎨 RANDOM COLOR FOR EACH DETECTION
                const color = "#" + Math.floor(Math.random() * 16777215).toString(16);

                // Draw bounding box
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.strokeRect(x1, y1, w, h);

                // Label background
                ctx.fillStyle = color;
                ctx.fillRect(x1, y1 - 22, 210, 22);

                // Label text
                ctx.fillStyle = "white";
                ctx.font = "16px Arial";
                ctx.fillText(
                    `${det.name} | ${(det.conf * 100).toFixed(1)}% | ${det.w.toFixed(1)}x${det.h.toFixed(1)}`,
                    x1 + 4,
                    y1 - 6
                );
            });

            requestAnimationFrame(drawLoop);
        }
    </script>

</body>
</html>
